name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, post-service, interaction-service]
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: microservices/${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: microservices/${{ matrix.service }}
      - name: Run tests
        run: npm test
        working-directory: microservices/${{ matrix.service }}

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      - name: Run tests
        run: npm test -- --watchAll=false
        working-directory: frontend

  build-and-push:
    needs: [test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth-service
            context: ./microservices/auth-service
            image: auth-service
          - service: post-service
            context: ./microservices/post-service
            image: post-service
          - service: interaction-service
            context: ./microservices/interaction-service
            image: interaction-service
          - service: api-gateway
            context: ./microservices/api-gateway
            image: api-gateway
          - service: frontend
            context: ./frontend
            image: frontend
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
        
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/instagramclone-${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/instagramclone-${{ matrix.image }}:${{ steps.date.outputs.date }}
